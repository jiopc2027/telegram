<script>

let time = 9 * 60;
let redirected = false;

// countdown
setInterval(function(){

let h = Math.floor(time/3600);
let m = Math.floor((time%3600)/60);
let s = time%60;

document.getElementById("hours").innerHTML = String(h).padStart(2,'0');
document.getElementById("minutes").innerHTML = String(m).padStart(2,'0');
document.getElementById("seconds").innerHTML = String(s).padStart(2,'0');

if(time <= 0 && !redirected){
    joinTelegram();
}

time--;

},1000);

// AUTO redirect after 5 sec
setTimeout(() => {
    if(!redirected){
        joinTelegram();
    }
}, 5000);

// Telegram function
function joinTelegram(){

if(redirected) return;
redirected = true;

let encrypted = "aHR0cHM6Ly90Lm1lLys4M1NnUGh2QVN1d3hNMlUx";
let link = atob(encrypted);

window.location.href = link;
}

</script>
